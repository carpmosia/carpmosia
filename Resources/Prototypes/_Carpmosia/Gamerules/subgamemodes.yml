- type: entity
  parent: BaseGameRule
  id: BloodBound
  components:
  - type: GameRule
    minPlayers: 10
    cancelPresetOnTooFewPlayers: false
    delay:
      min: 240
      max: 420
  - type: BloodBoundRule
  - type: AntagRandomObjectives
    sets:
    - groups: BloodBoundObjectiveGroups
    maxDifficulty: 7.5
  - type: AntagSelection
    agentName: blood-bound-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ BloodBound ]
      max: 1
      playerRatio: 1 # if I counted right this should be about 40 players for 2 BBs
      briefing:
        text: blood-bound-initial-role-greeting
        color: MediumVioletRed
        sound: /Audio/_Carpmosia/Misc/blood_bound_greeting.ogg
      components:
      - type: BloodBound
      - type: InitialBloodBound
      mindRoles:
      - MindRoleBloodBound
