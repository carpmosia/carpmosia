- type: entity
  parent: BaseGameRule
  id: BloodBound
  components:
  - type: GameRule
    minPlayers: 10
    cancelPresetOnTooFewPlayers: false
    delay:
      min: 240
      max: 420
  - type: BloodBoundRule
  - type: AntagRandomObjectives
    sets:
    - groups: BloodBoundObjectiveGroups
    maxDifficulty: 7.5
  - type: AntagSelection
    agentName: blood-bound-round-end-agent-name
    selectionTime: PrePlayerSpawn
    antags:
    - !type:LinearAntagCount
      proto: BloodBound
      playerRatio: 1
      range:
        min: 1
        max: 1
