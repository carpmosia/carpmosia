# SharedClown loadouts to be inherited by every other group
- type: loadoutGroup
  parent: BaseHead
  id: SharedClownHead
  loadouts:
  - JesterHat
  - JesterAltHat

- type: loadoutGroup
  parent: BaseBackpack
  id: SharedClownBackpack
  loadouts:
  - ClownBackpack
  - ClownSatchel
  - ClownDuffel

- type: loadoutGroup
  parent: BaseShoes
  id: SharedClownShoes
  loadouts:
  - ClownShoes
  - JesterShoes
