
- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseBloodBoundObjective
  components:
  - type: Objective
    issuer: objective-issuer-blood-bound
  - type: RoleRequirement
    roles:
    - BloodBoundRole

# Converted blood bound
- type: entity
  parent: [BaseBloodBoundObjective, BaseTargetObjective]
  id: BloodBoundConvertedObjective
  name: Help your blood bound.
  description: Assist your blood bound in completing all of their objectives no matter the cost.
  components:
  - type: Objective
    difficulty: 0 # never given randomly anyways
    issuer: objective-issuer-blood-bound
    icon:
      sprite: /Textures/Interface/Alerts/bleed.rsi
      state: bleed10
  - type: TargetObjective
    title: objective-condition-blood-bound-progress-title
  - type: HelpProgressCondition
  - type: ConvertedBloodBoundObjective

# state

- type: entity
  parent: BaseBloodBoundObjective
  id: BloodBoundEscapeShuttleObjective
  name: Escape to centcomm alive and unrestrained.
  description: You must escape to Central Command alive and unrestrained with your blood bound.
  components:
  - type: Objective
    difficulty: 1.5
    icon:
      sprite: Structures/Furniture/chairs.rsi
      state: shuttle
  - type: ObjectiveBlacklistRequirement
    blacklist:
      components:
      - SelfAndTargetSurviveCondition
  - type: TargetObjective
    title: objective-condition-blood-bound-escape-title
  - type: BloodBoundTarget
  - type: SelfAndTargetEscapeShuttleCondition

- type: entity
  parent: [BaseBloodBoundObjective, DieObjective]
  id: BloodBoundDieObjective

- type: entity
  parent: BaseBloodBoundObjective
  id: BloodBoundurviveObjective
  name: Survive.
  description: We just need you and your blood bound alive, cuffs or not. Escaping to centcomm is not necessary.
  components:
  - type: Objective
    difficulty: 1.5
    icon:
      sprite: Objects/Specific/Medical/medical.rsi
      state: gauze
  - type: ObjectiveBlacklistRequirement
    blacklist:
      components:
      - SelfAndTargetEscapeShuttleCondition
  - type: TargetObjective
    title: objective-condition-blood-bound-survive-title
  - type: BloodBoundTarget
  - type: SelfAndTargetSurviveCondition

