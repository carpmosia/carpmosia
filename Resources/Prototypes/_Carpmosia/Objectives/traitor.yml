# teach em a lesson
- type: entity
  parent: [BaseTraitorObjective]
  id: TeachRandomPersonObjective
  description: You probably know why. They only need to die once.
  components:
  - type: Objective
  # Killing someone once isn't THAT hard
    difficulty: 1.25
    unique: false
    icon:
      sprite: Objects/Weapons/Melee/baseball_bat.rsi
      state: icon
  - type: TargetObjective
    title: objective-condition-teach-person-title
  - type: PickRandomPerson
    filters:
    # Can't have multiple objectives to kill the same person.
    - !type:TargetObjectiveMindFilter
      blacklist:
        components:
        - TeachPersonCondition
        - KillPersonCondition
  - type: TeachPersonCondition
