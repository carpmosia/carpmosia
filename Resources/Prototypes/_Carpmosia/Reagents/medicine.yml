- type: reagent
  id: Tetracordrazine
  name: reagent-name-tetracordrazine
  group: Medicine
  desc: reagent-desc-tetracordrazine
  physicalDesc: reagent-physical-desc-viscous
  flavor: medicine
  color: "#942222"
  metabolisms:
    Bloodstream:
      metabolismRate: 0.5
      effects:
        - !type:EvenHealthChange
          conditions:
          - !type:MobStateCondition
            mobstate: Critical
          damage:
            Brute: -3.0
            Burn: -4.0
            Toxin: -1.0
        - !type:EvenHealthChange
          conditions:
          - !type:MobStateCondition
            mobstate: Alive
          damage:
            Brute: -1.5
            Burn: -2.0
            Toxin: -0.5
        - !type:HealthChange
          conditions:
          - !type:ReagentCondition
            reagent: Tetracordrazine
            min: 11
          damage:
            types:
              Cellular: 0.75

