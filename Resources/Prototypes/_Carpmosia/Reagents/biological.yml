      - !type:EvenHealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Bloodsucker ]
        damage:
          Brute: -3
          Burn: -1.25
    Bloodstream: # Don't inject someone else's blood into yourself! Your own blood won't actually metabolise.
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Vulpkanin ]
          inverted: true
        damage:
          types:
            Poison: 0.2
            Cellular: 0.05
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Vulpkanin ]
        damage:
          types:
            Poison: 0.2
