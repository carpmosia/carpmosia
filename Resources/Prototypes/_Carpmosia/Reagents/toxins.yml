- type: reagent
  id: ChromicAcid
  name: reagent-name-chromic-acid
  group: Toxins
  desc: reagent-desc-chromic-acid
  physicalDesc: reagent-physical-desc-oxidizing
  contrabandSeverity: Minor
  flavor: acid
  color: "#ff3021"
  boilingPoint: 337.0 # These parameters are the same as sulfuric acid, because this stuff is basically enhanced sulfuric acid in reality.
  meltingPoint: 10.31
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: 15
  - !type:PlantAdjustWeeds
    amount: -5
  - !type:PlantAdjustHealth
    amount: -10
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        ignoreResistances: false
        damage:
          types:
            Caustic: 0.2
            Cellular: 0.05 # The only chem capable of dealing cellular damage if someone slips on a puddle of it, or is splashed by it.
      - !type:Emote
        emote: Scream
        probability: 0.1
  metabolisms:
    Bloodstream:
      metabolismRate: 3.00 # High damage, high metabolism rate. Analogous to fluorosulfuric acid, but with 3 damage points substituted to cellular.
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Vulpkanin ]
          inverted: true
        damage:
          types:
            Caustic: 5
            Cellular: 3
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition # Vulpkanin have chromium-based blood, and are resistant to the cellular damage, but not the caustic damage.
          type: [ Vulpkanin ]
        damage:
          types:
            Caustic: 5
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.33
      - !type:Emote
        emote: Scream
        probability: 0.2

- type: reagent
  id: SodiumDichromate
  name: reagent-name-sodium-dichromate
  group: Toxins
  desc: reagent-desc-sodium-dichromate
  physicalDesc: reagent-physical-desc-vibrant
  allowedJobs:
  - Chemist
  flavor: carcinogenic
  color: "#ff9a0d"
  boilingPoint: 400.0 #Decomposes in real life
  meltingPoint: 356.7
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: 7
  - !type:PlantAdjustWeeds
    amount: -2
  - !type:PlantAdjustHealth
    amount: -5
  metabolisms:
    Bloodstream:
      metabolismRate: 0.5
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Vulpkanin ]
          inverted: true
        damage:
          types:
            Poison: 1  # Potent, but outclassed by other options.
            Cellular: 0.5
