- type: gameMap
  id: SerenityPeak
  mapName: 'Serenity Peak'
  mapPath: /Maps/_Carpmosia/serenity_peak.yml
  minPlayers: 30
  stations:
    SerenityPeak:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Serenity Outpost {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'B'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_Carpmosia/Shuttles/emergency_serenity_peak.yml
        - type: StationCargoShuttle
          path: /Maps/_Carpmosia/Shuttles/cargo_serenity.yml
        - type: StationJobs
          availableJobs: # 66 jobs total w/o latejoins & interns, 83 jobs total w/ latejoins & interns
            #command (7)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            #service (12 - 14)
            Bartender: [ 1, 1 ]
            Botanist: [ 2, 3 ]
            Chef: [ 2, 2 ]
            Janitor: [ 2, 2 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            ServiceWorker: [ 2, 3 ]
            Reporter: [ 1, 1 ]
            #engineering (8)
            AtmosphericTechnician: [ 3, 3 ]
            StationEngineer: [ 5, 5 ]
            TechnicalAssistant: [ 3, 3 ] #intern, not counted
            #medical (9)
            Chemist: [ 2, 2 ]
            MedicalDoctor: [ 4, 4 ]
            Paramedic: [ 2, 2 ]
            MedicalIntern: [ 3, 3 ] #intern, not counted
            Psychologist: [ 1, 1 ]
            #science (5)
            Scientist: [ 5, 5 ]
            ResearchAssistant: [ 4, 4 ] #intern, not counted
            #security (9 - 10)
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 6, 6 ]
            Detective: [ 1, 1 ]
            SecurityCadet: [ 4, 4 ] #intern, not counted
            Lawyer: [ 1, 2 ]
            #supply (8)
            SalvageSpecialist: [ 3, 3 ]
            CargoTechnician: [ 5, 5 ]
            #civilian (4+)
            Passenger: [ -1, -1 ] #infinite, not counted
            Clown: [ 1, 1 ]
            Mime: [ 2, 2 ]
            Musician: [ 1, 1 ]
            #silicon (4)
            Borg: [ 3, 3 ]
            StationAi: [ 1, 1 ]
