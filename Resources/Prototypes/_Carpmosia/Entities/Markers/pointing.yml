- type: entity
  abstract: true
  categories: [ HideSpawnMenu ]
  id: PointerBase
  name: pointing arrow # they don't need unique names
  components:
  - type: Tag
    tags:
      - HideContextMenu
  - type: Sprite
    sprite: _Carpmosia/Interface/Misc/pointing.rsi
    state: arrow
    drawdepth: Overlays
    noRot: true
  - type: PointingArrow
    duration: 4
    step: 0.5
    speed: 1
  - type: Appearance

- type: entity
  categories: [ HideSpawnMenu ]
  parent: PointerBase
  id: PointerArrow # Functionally identical to upstream pointer, but using our RSI

- type: entity
  categories: [ HideSpawnMenu ]
  parent: PointerBase
  id: PointerDagger
  components:
  - type: Sprite
    state: dagger

- type: entity
  categories: [ HideSpawnMenu ]
  parent: PointerBase
  id: PointerHammer
  components:
  - type: Sprite
    state: hammer

- type: entity
  categories: [ HideSpawnMenu ]
  parent: PointerBase
  id: PointerCrosshair
  components:
  - type: Sprite
    state: crosshair

- type: entity
  categories: [ HideSpawnMenu ]
  parent: PointerBase
  id: PointerMicrophone
  components:
  - type: Sprite
    state: microphone
