- type: entity
  categories: [ HideSpawnMenu, Spawner ]
  parent: BaseAntagSpawner
  id: SpawnPointGhostDerelictCyborgSpiderClan
  components:
  - type: GhostRole
    name: ghost-role-information-spider-clan-borg-name
    description: ghost-role-information-spider-clan-borg-description
    rules: ghost-role-information-silicon-rules
    mindRoles:
    - MindRoleSubvertedSilicon
    raffle:
      settings: default
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Mobs/Silicon/chassis.rsi
      state: derelict_icon


#ment to be in a /silicon

- type: entity
  id: PlayerBorgSliderClanGhostRole
  parent: PlayerBorgSpiderClanBattery
  suffix: Ghost role
  components:
    - type: GhostRole
      name: ghost-role-information-spider-clan-borg-name
      description: ghost-role-information-spider-clan-borg-description
      rules: ghost-role-information-silicon-rules
      raffle:
        settings: default
      job: Borg
    - type: GhostTakeoverAvailable


- type: entity
  id: PlayerBorgSpiderClanBattery
  parent: BorgChassisSpiderClan
  suffix: Battery, Module, Operative
  components:
  - type: NukeOperative
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - BorgModuleTool
        - BorgModuleSyndicateWeapon
        - XenoborgModuleCloakDevice
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper

#ment to be in a /base_brog_chassis

- type: entity
  id: BaseBorgChassisSpiderClan
  parent: BaseBorgChassis
  abstract: true
  components:
  - type: NpcFactionMember
    factions:
    - Syndicate
  - type: Access
    tags:
    - NuclearOperative
    - SyndicateAgent
  - type: AccessReader
    access: [["SyndicateAgent"], ["NuclearOperative"]]
  - type: SiliconLawProvider
    laws: Ninja
    subverted: true
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
    - Common
  - type: ActiveRadio
    channels:
    - Binary
    - Common
  - type: ShowJobIcons
  - type: MovementAlwaysTouching
  - type: Speech
    speechSounds: SyndieBorg
    allowedEmotes:
    - Laugh
  - type: Vocal
    sounds:
      Unsexed: UnisexSiliconSyndicate
  - type: PointLight
    color: "#dd200b"



#Ment to be in a /borg_chassis

- type: entity
  id: BorgChassisSpiderClan
  parent: BaseBorgChassisSpiderClan
  name: Spider clan cyborg
  description: You are a spider clan cyborg, built for stealth and sabotage. Your mission is to help compleat the mission of the spider clan operatives by any means necessary.
  components:
    - type: Sprite
      layers:
        - state: synd_engi
        - state: synd_engi_e
          map: ["enum.BorgVisualLayers.Light"]
          shader: unshaded
          visible: false
        - state: synd_engi_l
          shader: unshaded
          map: ["light"]
          visible: false
    - type: BorgChassis
      maxModules: 6
      moduleWhitelist:
        tags:
          - BorgModuleGeneric
          - BorgModuleEngineering
          - BorgModuleSyndicate
          - XenoborgModuleStealth
      hasMindState: synd_engi_e
      noMindState: synd_engi
    - type: MovementAlwaysTouching #Allow it to move in space freely
    - type: ShowHealthBars
      damageContainers:
      - Inorganic
      - Silicon
    - type: InteractionPopup
      interactSuccessString: petting-success-syndicate-cyborg
      interactFailureString: petting-failure-syndicate-cyborg
      interactSuccessSound:
        path: /Audio/Ambience/Objects/periodic_beep.ogg


- type: entity
  categories: [ HideSpawnMenu, Spawner ]
  parent: SpawnPointGhostDerelictCyborgSpiderClan
  id: SpawnPointGhostSpiderClanCyborg
  components:
  - type: GhostRole
    name: ghost-role-information-spider-clan-borg-name
    description: ghost-role-information-spider-clan-borg-description
    rules: ghost-role-information-silicon-rules
    raffle:
      settings: default
