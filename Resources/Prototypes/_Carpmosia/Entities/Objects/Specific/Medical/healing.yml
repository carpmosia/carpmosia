- type: entity
  parent: Tourniquet
  id: Tourniquet1
  suffix: Single
  components:
  - type: Stack
    count: 1

- type: entity
  parent: BaseItem
  id: PowerCautery
  name: power cautery
  description: A miniature energy projector that creates a flash of superheated plasma at the pull of a trigger. it's integrated microreactor begins recharging ten seconds after use to avoid burnout.
  components:
  - type: Sprite
    sprite: _Carpmosia/Objects/Specific/Medical/power_cautery.rsi
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: icon
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: battery-5
      shader: unshaded
  - type: Appearance
  - type: BatteryVisuals
  - type: GenericVisualizer
    visuals: # TODO: make it use all 5 steps of the battery indicator w/ some other visualizer
      enum.BatteryVisuals.State: # because this one doesn't work
        enum.PowerCellVisualLayers.Unshaded:
          Full: {visible: true, state: battery-5}
          Neither: {visible: true, state: battery-3}
          Empty: {visible: false}
  - type: PowerCautery
    damageContainers:
    - Biological
    beginSound:
      path:  /Audio/Items/Medical/ointment_begin.ogg # TODO: more appropriate sound
    endSound:
      path:  /Audio/Effects/lightburn.ogg
  - type: Battery
    maxCharge: 100
    startingCharge: 100
  - type: BatterySelfRecharger
    autoRechargeRate: 4
    autoRechargePauseTime: 10s
