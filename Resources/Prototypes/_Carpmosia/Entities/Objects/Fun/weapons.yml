- type: entity
  parent: [ BaseItem, BaseToyGun, BaseWeaponRifle ]
  id: WeaponRifleAkFoam
  name: AK-FF
  description: An automatic Foam Force rifle, now THIS is the future of foam gunfights! Foam or be Foamed!
  components:
  - type: Sprite
    sprite: _Carpmosia/Objects/Fun/Foam/AKFF.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    soundGunshot:
      path: /Audio/Effects/thunk.ogg
  - type: Clothing
    sprite: _Carpmosia/Objects/Fun/Foam/AKFF.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifleFoam
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - FoamRifleMag
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
          - BulletFoam
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

- type: entity
  parent: BaseItem # Didn't parent it off the base rifle mag since its security contraband.
  id: MagazineRifleFoam
  name: "AK-FF Magazine (Foam Dart)"
  description: A curved magazine containing standard foam ammunition.
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Carpmosia/Objects/Fun/Foam/rifle_foam_magazine.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - BulletFoam
    proto: BulletFoam
    capacity: 30
  - type: Tag
    tags:
    - FoamRifleMag
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
