- type: entity
  parent: PlushieLizard
  id: PlushieLizardScreams
  name: screaming lizard plushie
  description: An adorable stuffed toy that resembles a lizardperson, specifically a certain atmospheric technician. Even the smallest stimuli causes it to scream.
  components:
  - type: Sprite
    sprite: _Carpmosia/Objects/Fun/Plushies/lizard.rsi
    state: icon
  - type: Item
    sprite: _Carpmosia/Objects/Fun/Plushies/lizard.rsi
  - type: EmitSoundOnUse
    sound: &PlushieLizardScreamsSound
      path: /Audio/Voice/Reptilian/reptilian_scream.ogg
      params:
        volume: 0
        pitch: 1.3
        variation: 0.3
  - type: EmitSoundOnLand
    sound: *PlushieLizardScreamsSound
  - type: EmitSoundOnActivate
    sound: *PlushieLizardScreamsSound
  - type: EmitSoundOnTrigger
    sound: *PlushieLizardScreamsSound
  - type: EmitSoundOnCollide
    sound: *PlushieLizardScreamsSound
  - type: Edible
    useSound: *PlushieLizardScreamsSound
    transferAmount: 10
  - type: MeleeWeapon
    soundHit: *PlushieLizardScreamsSound
  - type: Clothing
    quickEquip: false
    sprite: _Carpmosia/Objects/Fun/Plushies/lizard.rsi
    slots:
    - HEAD
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: JuiceThatMakesYouScream
        Quantity: 30
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Fiber
          Quantity: 10
        - ReagentId: JuiceThatMakesYouScream
          Quantity: 10

- type: entity
  parent: BasePlushie
  id: PlushieArachindCole
  name: tider spider plushie
  description: An adorable stuffed toy that resembles an arachnid, specifically a certain tider. It shivers in the presence of contraband.
  components:
  - type: Sprite
    sprite: _Carpmosia/Objects/Fun/Plushies/arachnid.rsi
    state: icon
  - type: EmitSoundOnUse
    sound: &PlushieArachnidSound
      path: /Audio/Voice/Arachnid/arachnid_scream.ogg
  - type: EmitSoundOnLand
    sound: *PlushieArachnidSound
  - type: EmitSoundOnActivate
    sound: *PlushieArachnidSound
  - type: EmitSoundOnTrigger
    sound: *PlushieArachnidSound
  - type: EmitSoundOnCollide
    sound: *PlushieArachnidSound
  - type: Edible
    useSound: *PlushieArachnidSound
  - type: MeleeWeapon
    soundHit: *PlushieArachnidSound
  - type: Clothing
    quickEquip: false
    sprite: _Carpmosia/Objects/Fun/Plushies/arachnid.rsi
    slots:
    - HEAD
