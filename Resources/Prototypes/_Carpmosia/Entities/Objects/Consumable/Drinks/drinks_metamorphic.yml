# Transformable container - normal glass
- type: entity
  parent: DrinkGlass
  id: DrinkAngostura
  suffix: angostura
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: Angostura
          Quantity: 30
  - type: Icon
    sprite: Objects/Consumable/Drinks/wineglass.rsi
    state: icon

