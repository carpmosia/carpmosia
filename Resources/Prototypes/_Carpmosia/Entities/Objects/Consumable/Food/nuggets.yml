# copied from food meats
- type: entity
  abstract: true
  parent: FoodInjectableBase
  id: FoodNuggetBase
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - bread
  - type: Sprite
    sprite: Objects/Consumable/Food/meat.rsi
  - type: Extractable
    grindableSolutionName: food
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Nutriment
          Quantity: 3
        - ReagentId: UncookedAnimalProteins
          Quantity: 0.5
        - ReagentId: Fat
          Quantity: 3
  - type: Item
    size: Tiny
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        # less mass so it can cook faster, a single strip of bacon isnt 5kg
        density: 0.2
        mask:
        - ItemMask
        restitution: 0.3  # fite me
        friction: 0.1

- type: entity
  parent: FoodNuggetBase
  id: FoodNuggetRaw
  abstract: true
  components:
  - type: Tag
    tags:
    - Raw
    - Nugget
  - type: Sprite
    layers:
    - state: bird-cooked

- type: entity
  parent: FoodNuggetBase
  id: FoodNuggetCooked
  abstract: true
  components:
  - type: Tag
    tags:
    - Cooked
    - Nugget
  - type: Sprite
    layers:
    - state: bird-cooked
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Protein
          Quantity: 5
  - type: Item
    storedOffset: -1,1
    inhandVisuals:
      left:
      - state: plain-cooked-inhand-left
        color: "#F7E3A3"
      right:
      - state: plain-cooked-inhand-right
        color: "#F7E3A3"

