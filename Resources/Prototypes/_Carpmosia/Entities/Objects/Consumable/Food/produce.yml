# When adding new food also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\food_produce.yml

- type: entity
  parent: FoodProduceBase
  id: FoodCrudcoaPod
  name: crudcoa pod
  description: A pod-shaped ball of varying dull, grey plastics. You could almost use this as a basketball!
  components:
  - type: FlavorProfile
    flavors:
    - plastic
  - type: Solution
    solution:
      reagents:
      - ReagentId: Oil
        Quantity: 5
      - ReagentId: Phosphorus
        Quantity: 5
  - type: Sprite
    sprite: _Carpmosia/Objects/Specific/Hydroponics/crudcoa.rsi
  - type: Produce
    seedId: crudcoa
  - type: ToolRefinable
    qualityNeeded: Sawing
    refineResult:
    - id: SheetPlastic1
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100
