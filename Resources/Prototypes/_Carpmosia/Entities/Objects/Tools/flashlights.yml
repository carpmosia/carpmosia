- type: entity
  parent: [FlashlightLantern, BaseSecurityContraband]
  id: NeckLiteSecBase
  name: Angledseclite
  description: A robust light designed with thot of hand free use.
  components:
  - type: ToggleableVisuals
    clothingVisuals:
      neck:
      - state: equipped-neck-light
        shader: unshaded
      - type: ItemTogglePointLight
  - type: Sprite
    sprite: _Carpmosia/Objects/Tools/necklitesecbase.rsi
    layers:
    - state: neckseclite
    - state: neckseclite-on
      shader: unshaded
      visible: false
      map: [ "light" ]
  - type: Item
    sprite: _Carpmosia/Objects/Tools/necklitesecbase.rsi
    storedRotation: 0
  - type: PointLight
    radius: 7
  - type: Clothing
    sprite: _Carpmosia/Objects/Tools/necklitesecbase.rsi
    slots:
    - Belt
    - Neck
