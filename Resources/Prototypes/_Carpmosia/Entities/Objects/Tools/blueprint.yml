# Base blueprint prototypes:
#   Blueprints:
- type: entity
  abstract: true
  parent: BaseBlueprint
  id: BaseBlueprintAmmo
  name: ammo blueprint
  description: A blueprint for some machine. It can be inserted into an ammo techfab.
  components:
  - type: Sprite
    sprite: _Carpmosia/Objects/Tools/blueprint_ammo.rsi
    state: icon
  - type: Item
    storedSprite:
      sprite: _Carpmosia/Objects/Tools/blueprint_ammo.rsi
      state: storage
  - type: Tag
    tags:
    - BlueprintAmmoTechFab

