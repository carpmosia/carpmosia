# Base blueprint prototypes:
- type: entity
  parent: BaseItem
  id: BaseBlueprintAmmo
  name: ammo blueprint
  description: A blueprint for some machine. It can be inserted into an ammo techfab.
  abstract: true
  components:
  - type: Sprite
    sprite: _Carpmosia/Objects/Tools/blueprint_ammo.rsi
    state: icon
  - type: Item
    size: Normal
    shape:
    - 0,0,2,0
    storedSprite:
      sprite: _Carpmosia/Objects/Tools/blueprint_ammo.rsi
      state: storage
  - type: Blueprint
  - type: StaticPrice
    price: 1000
  - type: Tag
    tags:
    - BlueprintAmmoTechFab

