- type: entity
  parent: WallReinforcedDiagonal
  id: WallReinforcedDiagonalRust
  suffix: rusted
  components:
  - type: Sprite
    sprite: _Carpmosia/Structures/Walls/reinforced_rust_diagonal.rsi
  - type: Icon
    sprite: _Carpmosia/Structures/Walls/reinforced_rust_diagonal.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:ChangeConstructionNodeBehavior
        node: girder
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:DoActsBehavior
        acts: ["Destruction"]

