- type: entity
  abstract: true
  parent: PosterBase
  id: PosterBaseCarpHuvy
  components:
  - type: Sprite
    sprite: _Carpmosia/Structures/Wallmounts/Posters/huvy.rsi # Huvy posters are licensed differently from upstream

- type: entity
  parent: PosterBaseCarpHuvy
  id: PosterLegitBarDrinks
  name: Bar Poster
  description: The Bartender is always there to hear your woes and get you plastered all at the same time. Go have a visit!
  components:
  - type: Sprite
    state: bar_drinks

- type: entity
  parent: PosterBaseCarpHuvy
  id: PosterLegitBotanyFood
  name: Fruit Basket
  description: Botany is always hard at work! Stop by and enjoy the best they can offer!
  components:
  - type: Sprite
    state: botany_food

- type: entity
  parent: PosterBaseCarpHuvy
  id: PosterContrabandBreadLies
  name: Bread Lies
  description: You have been lied to. There is no "Big Bread." It is not real. Please stop looking for it.
  components:
  - type: Sprite
    state: bread_lies

- type: entity
  parent: PosterBaseCarpHuvy
  id: PosterContrabandDonkExplosion
  name: Donk!
  description: "Bite into a blast of flavour with any of our #1 rated fattening and unhealthy products for your enjoyment! DONK!"
  components:
  - type: Sprite
    state: donk_explosion

- type: entity
  parent: PosterBaseCarpHuvy
  id: PosterLegitEatMeat
  name: Eat Meat!
  description: Who needs fruit or veggies? EAT MEAT! Build those muscles and go fight in the arena to show them gains!
  components:
  - type: Sprite
    state: eat_meat

- type: entity
  parent: PosterBaseCarpHuvy
  id: PosterLegitMoreBread
  name: More Bread!
  description: There is not enough bread! MAKE MORE!
  components:
  - type: Sprite
    state: more_bread

- type: entity
  parent: PosterBaseCarpHuvy
  id: PosterLegitPieSlice
  name: Pie Poster
  description: Pies are healthy and delicious! Beg your chef to start making some.
  components:
  - type: Sprite
    state: pie_slice

- type: entity
  parent: PosterBaseCarpHuvy
  id: PosterLegitPizzaHope
  name: Pizza Hope
  description: In the darkest of times there is only one hope, PIZZA! Harass your local Quartermaster to order an emergency crate of pizza now!
  components:
  - type: Sprite
    state: pizza_hope
