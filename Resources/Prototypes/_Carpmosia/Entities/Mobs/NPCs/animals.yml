- type: entity
  parent: MobMothroach
  id: MobSyndimothroach
  name: syndimothroach
  description: This is the result of a genetic engineering campaign of questionable ethics, aimed at producing a living weapon you can hold gently like a burger.
  components:
  - type: GhostRole
    name: ghost-role-information-syndimothroach-name
    description: ghost-role-information-syndimothroach-description
    rules: ghost-role-information-syndimothroach-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
  - type: Sprite
    sprite: _Carpmosia/Mobs/Animals/syndimothroach.rsi
  - type: Clothing
    sprite: _Carpmosia/Mobs/Animals/syndimothroach.rsi
  - type: MobPrice
    price: 700
  - type: Tag
    tags:
    - Trash
    - CannotSuicide
    - VimPilot
    - Unimplantable # better than syndicat when microbomb
  - type: NpcFactionMember
    factions:
    - Syndicate
    - Mouse
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 60
      behaviors:
      - !type:GibBehavior { }
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Effects/bite.ogg
    angle: 15
    animation: WeaponArcBite
    damage:
      types:
        Slash: 4
        Piercing: 6
        Structural: 15
  # Copied from MobCatSpace
  - type: Temperature
  - type: TemperatureDamage
    heatDamageThreshold: 423
    coldDamageThreshold: 0
  - type: MovementAlwaysTouching
  - type: PressureImmunity
  - type: Insulated
  - type: Respirator
    minSaturation: 5.0

- type: entity
  parent: [ SolutionFood, SolutionTiny, SimpleSpaceMobBase ]
  id: MobBagFish
  name: bag fish
  description: An iddle widdle fish rolling around in a plastic bag!
  components:
  - type: Emoting
  - type: Sprite
    drawdepth: Mobs
    sprite: _Carpmosia/Mobs/Animals/bagfish.rsi
    layers:
    - map: ["fish", "movement-fish"]
      state: fish
    - map: ["enum.DamageStateVisualLayers.Base", "movement-bag"]
      state: bag
  - type: SpriteMovement
    movementLayers:
      movement-bag:
        state: bag-moving
      movement-fish:
        state: fish-moving
    noMovementLayers:
      movement-bag:
        state: bag
      movement-fish:
        state: fish
  - type: RandomSprite
    available:
      - fish:
          fish: Rainbow
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.2
        density: 100
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      10: Dead
  - type: DamageStateVisuals
    states:
      Alive:
        Base: bag
      Critical:
        Base: bag-dead
      Dead:
        Base: bag-dead
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - CannotSuicide
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 2
      - ReagentId: Water
        Quantity: 10
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTypeTrigger
        damageType: Piercing
        damage: 30
      behaviors:
      - !type:GibBehavior
        recursive: false
  - type: MovementSpeedModifier
    baseWalkSpeed : 1
    baseSprintSpeed : 1.4
  - type: MobPrice
    price: 100
  - type: Extractable
    grindableSolutionName: food
  - type: Solution
    solution:
      reagents:
      - ReagentId: UncookedAnimalProteins
        Quantity: 3
      - ReagentId: Water
        Quantity: 12
  - type: ZombieImmune
