#CBURN Hardsuit
- type: entity
  parent: ClothingHeadHelmetCBURN
  id: ClothingHeadHelmetCBURNPointman
  name: CBURN exosuit helmet
  description: A pressure resistant and fireproof hood worn by the Pointman of special cleanup units. The Pointman's helmet features a distinct visor chosen with CQB in mind.
  components:
  - type: Sprite
    sprite: _Carpmosia/Clothing/Head/Hardsuits/cburnpointman.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
    - state: light-overlay
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      - state: equipped-head-unshaded
        shader: unshaded
      head-vox:
      - state: equipped-head-vox
      - state: equipped-head-unshaded-vox
        shader: unshaded
      head-reptilian:
      - state: equipped-head-reptilian
      - state: equipped-head-unshaded-reptilian
        shader: unshaded
  - type: PointLight
    color: orange
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.005
    coolingCoefficient: 0.005
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.8
        Heat: 0.9
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.75
