- type: entity
  parent:
  - AppearanceAvali
  - BaseSpeciesMobOrganic
  id: MobAvali
  name: Urist McRaptor
  components:
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 3
  - type: Hunger
    baseDecayRate: 0.03 # Slightly lower decay-rate than scurrets
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 95 #tiny
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Speech
    speechVerb: Parrot # RMC did it right.
    speechSounds: MaleAvali
  - type: Vocal
    sounds:
      Male: MaleAvali
      Female: FemaleAvali
      Unsexed: MaleAvali
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Avali
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    currentTemperature: 296.15
    specificHeat: 48
  - type: TemperatureDamage
    heatDamageThreshold: 310
    coldDamageThreshold: 223
    coldDamage:
      types:
        Cold : 0.05
    heatDamage:
      types:
        Heat : 3
  - type: TemperatureSpeed
    thresholds:
      265: 0.8
      251: 0.6
      226: 0.4
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: AmmoniaBlood
        Quantity: 300
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: ThermalRegulator
    metabolismHeat: 400 # icebirb go brrr
    radiatedHeat: 100
    implicitHeatRegulation: 500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 296.15
    thermalRegulationTemperatureThreshold: 10

- type: entity
  parent: OrganBase
  id: OrganAvali
  abstract: true
  suffix: human

- type: entity
  id: OrganAvaliMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    updateInterval: 0.7
    metabolizerTypes: [ Avali ]

