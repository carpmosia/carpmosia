      belt:
        sizeMaps:
          32:
            sprite: _Carpmosia/Mobs/Species/Lagomorph/displacement.rsi
            state: belt

- type: entity
  parent:
  - AppearanceLagomorph
  - BaseSpeciesMobOrganic
  id: MobLagomorph
  name: Urist McRabbit
  components:
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#ccac1f"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Speech
    speechSounds: Lagomorph
    speechVerb: Rabbit
  - type: Vocal
    sounds:
      Male: MaleLagomorph
      Female: FemaleLagomorph
      Unsexed: MaleLagomorph
  - type: Damageable
    damageModifierSet: Vulpkanin
  - type: Temperature
    specificHeat: 44
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold: 0.05 # Per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 2.5 # Per second, scales with temperature & other constants
  - type: TemperatureProtection
    heatingCoefficient: 1.2
    coolingCoefficient: 0.3
  - type: SprintAbility
    action: ActionLagomorphSprint
    staminaCost: 35 # equivalent to one batong hit
    duration: 10
    sprintSound:
      path: /Audio/Weapons/punchmiss.ogg # TODO: get a more fitting sound
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: SulfurBlood
        Quantity: 300
  - type: CreamPied
    sprite:
      sprite: Effects/creampie.rsi
      state: creampie_vulpkanin

