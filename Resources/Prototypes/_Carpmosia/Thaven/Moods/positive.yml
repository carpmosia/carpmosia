# "Yes, and" moods will encourage players towards certain behaviors and objects

# Make sure to add new moods to this dataset or they will not be selected!!!!!!
- type: dataset
  id: ThavenMoodsPositive
  values:
  - PossessiveOfProperty
  - ExcessivelyOrganized
  - MostImportant
  - LeastImportant
  - MustDoDrugs
  - WorshipSilicons
  - DinnerEtiquette
  - HugGood
  - NeverAlone
  - VeryReligious
  - OnlySpeakToCommand
  - Scheduler
  - ProperStorage
  - TheftNeutral
  - Duel
  - Prometheus
  - Klingon
  - SogginsLaw
  - Generous
  - FavorsRepaid
  - Bookkeeper
  - SacredBlood
  - GiftReciever
  - NewJob
  - DepartmentTitle
  - Barefoot
  - Hospitable
  - VoxSymp
  - Smoker
  - EyeForEye
  - Optimist
  - ItemGood
  - Hypochondriac
  - ImposterSyndrome
  - YesMan
  - Centrist
  - SpeechRestriction


# You are extremely possessive of your property. Refuse to relinquish it, and if it is misplaced or stolen, it must be retrieved at all costs.
- type: thavenMood
  id: PossessiveOfProperty
  moodName: mood-positive-possessive-of-property-name
  moodDesc: mood-positive-possessive-of-property-desc


# You are obsessively organized - everything has its place and must be returned to it.
- type: thavenMood
  id: ExcessivelyOrganized
  moodName: mood-positive-excessively-organized-name
  moodDesc: mood-positive-excessively-organized-desc
  conflicts:
  - ExcessivelyDisorganized

# You are the most important person aboard the station.
- type: thavenMood
  id: MostImportant
  moodName: mood-positive-most-important-name
  moodDesc: mood-positive-most-important-desc
  conflicts:
  - LeastImportant
  - DontSpeakToCommand
  - OnlySpeakToCommand


# You are the least important person aboard the station.
- type: thavenMood
  id: LeastImportant
  moodName: mood-positive-least-important-name
  moodDesc: mood-positive-least-important-desc
  conflicts:
  - MostImportant
  - OnlySpeakToCommand

# You must be inebriated at all times.
- type: thavenMood
  id: MustDoDrugs
  moodName: mood-positive-must-do-drugs-name
  moodDesc: mood-positive-must-do-drugs-desc
  conflicts:
  - DisapproveOfDrugs

# You worship Silicons as gods, and regard their word as law.
- type: thavenMood
  id: WorshipSilicons
  moodName: mood-positive-worship-silicons-name
  moodDesc: mood-positive-worship-silicons-desc
  conflicts:
  - DetestSilicons

# Food must be consumed in the manner of a proper meal - seated at a table, in courses, with dishes and utensils.
- type: thavenMood
  id: DinnerEtiquette
  moodName: mood-positive-dinner-etiquette-name
  moodDesc: mood-positive-dinner-etiquette-desc
  conflicts:
  - DinnerFloor

# It is extremely impolite not to hug people frequently.
- type: thavenMood
  id: HugGood
  moodName: mood-positive-hug-good-name
  moodDesc: mood-positive-hug-good-desc
  conflicts:
  - HugBad

# You must strive to be around others whenever possible.
- type: thavenMood
  id: NeverAlone
  moodName: mood-positive-never-alone-name
  moodDesc: mood-positive-never-alone-desc
  conflicts:
  - AlwaysAlone

# You must attend the chapel regularly to pray, and speak with the Chaplain if possible.
- type: thavenMood
  id: VeryReligious
  moodName: mood-positive-very-religious-name
  moodDesc: mood-positive-very-religious-desc
  conflicts:
