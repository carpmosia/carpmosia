  id: DepartmentTitle
  moodName: mood-positive-no-department-title-name
  moodDesc: mood-positive-no-department-title-desc
  conflicts:
  - SpeechRestriction

# The ground you walk on is sacred. You must not wear shoes.
- type: thavenMood
  id: Barefoot
  moodName: mood-positive-shoes-bad-name
  moodDesc: mood-positive-shoes-bad-desc

# You must ensure all new arrivals are properly welcomed to the station.
- type: thavenMood
  id: Hospitable
  moodName: mood-positive-hospitable-name
  moodDesc: mood-positive-hospitable-desc

# Vox Sympathizer: To demonstrate your allyship for the Vox, you must be wearing internals at all times.
- type: thavenMood
  id: VoxSymp
  moodName: mood-positive-voxsymp-name
  moodDesc: mood-positive-voxsymp-desc

# [ITEM]s are endlessly fascinating. You must collect as many as you can, and ensure others treat them with respect.
- type: thavenMood
  id: ItemGood
  moodName: mood-positive-item-good-name
  moodDesc: mood-positive-item-good-desc
  moodVars:
    item: Items
#  conflicts:
#  - ItemBad

# Smoker: You are hopelessly addicted to cigarettes. You must be smoking one at all times.
- type: thavenMood
  id: Smoker
  moodName: mood-positive-smoker-name
  moodDesc: mood-positive-smoker-desc
  conflicts:
