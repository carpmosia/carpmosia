# You are too important to speak to the rabble. You will only talk to Command.
- type: thavenMood
  id: OnlySpeakToCommand
  moodName: mood-positive-only-speak-to-command-name
  moodDesc: mood-positive-only-speak-to-command-desc
  conflicts:
  - DontSpeakToCommand

# Time must be strictly managed. Everything must be scheduled, and tardiness is exceptionally rude.
- type: thavenMood
  id: Scheduler
  moodName: mood-positive-scheduler-name
  moodDesc: mood-positive-scheduler-desc
  conflicts:
  - Procrastinator

# Speaking face-to-face is unacceptably personal. Any conversation must be had over the radio, or through an intermediary individual.
- type: thavenMood
  id: RadioOnly
  moodName: mood-positive-radio-only-name
  moodDesc: mood-positive-radio-only-desc
  conflicts:
  - NoRadio

# It is unacceptable to allow personal belongings to touch the floor. Your possessions should be properly stored, placed on tables, or exchanged by hand.
- type: thavenMood
  id: ProperStorage
  moodName: mood-positive-proper-storage-name
  moodDesc: mood-positive-proper-storage-desc
  conflicts:
  - ImproperStorage

# Theft is a morally neutral act. You don't understand the concept of property as it relates to other people.
- type: thavenMood
  id: TheftNeutral
  moodName: mood-positive-theft-neutral-name
  moodDesc: mood-positive-theft-neutral-desc

# Disagreements must be settled through a formal duel, violent or otherwise. The winner is correct.
- type: thavenMood
  id: Duel
  moodName: mood-positive-duel-name
  moodDesc: mood-positive-duel-desc

# You possess incalculable wisdom, and all must hear it.
- type: thavenMood
  id: Prometheus
  moodName: mood-positive-prometheus-name
  moodDesc: mood-positive-prometheus-desc

# You must openly carry a lethal weapon at all times, even if you cannot use it - it is a great dishonor to be unarmed.
- type: thavenMood
  id: Klingon
  moodName: mood-positive-klingon-name
  moodDesc: mood-positive-klingon-desc

# All agreements must be documented and signed for posterity and authenticity, no matter how small.
- type: thavenMood
  id: SogginsLaw
  moodName: mood-positive-soggins-name
  moodDesc: mood-positive-soggins-desc

# Imitation is the highest form of flattery. Attempt to emulate the mannerisms and accents of everyone you speak to.
- type: thavenMood
  id: Imitation
  moodName: mood-positive-imitation-name
  moodDesc: mood-positive-imitation-desc

