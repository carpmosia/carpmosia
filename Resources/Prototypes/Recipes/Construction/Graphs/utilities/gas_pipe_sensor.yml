            amount: 2
          - !type:DeleteEntity
        conditions:
          - !type:EntityAnchored
            anchored: false
        steps:
          - tool: Welding
            doAfter: 1

  # Carpmosia-start - 5 pipe layers
  - node: sensorAlt3
    entity: GasPipeSensorAlt3
    actions:
      - !type:SetAnchor
    edges:
      - to: start
        completed:
          - !type:SpawnPrototype
            prototype: SheetSteel1
            amount: 2
          - !type:DeleteEntity
