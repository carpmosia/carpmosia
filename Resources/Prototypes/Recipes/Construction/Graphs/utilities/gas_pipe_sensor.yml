- type: constructionGraph
  id: GasPipeSensor
  start: start
  graph:
  - node: start
    edges:
    - to: sensor
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: sensorAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: sensorAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    # Carpmosia-start - 5 pipe layers
    - to: sensorAlt3
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: sensorAlt4
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
    # Carpmosia-end - 5 pipe layers

  - node: sensor
    entity: GasPipeSensor
    actions:
    - !type:SetAnchor
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 2
      - !type:DeleteEntity
      conditions:
      - !type:EntityAnchored
        anchored: false
      steps:
      - tool: Welding
        doAfter: 1

  - node: sensorAlt1
