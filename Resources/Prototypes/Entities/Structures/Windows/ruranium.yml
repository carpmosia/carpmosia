- type: entity
  id: ReinforcedUraniumWindow
  name: reinforced uranium window
  parent: [BaseDeltaPressureReinforcedPlasma, WindowRCDResistant]
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _Carpmosia/Structures/Windows/uranium_reinforced.rsi # Carpmosia-edit - Window resprite
  - type: Icon
    sprite: _Carpmosia/Structures/Windows/uranium_reinforced.rsi # Carpmosia-edit - Window resprite
  - type: Damageable
    damageModifierSet: RGlass
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 225
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassUranium:
            min: 1
            max: 2
          PartRodMetal:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: windows_uranium # Carpmosia-edit - Wall resprite
    base: full # Carpmosia-edit - Window resprite
  - type: Construction
    graph: Window
    node: reinforcedUraniumWindow
  - type: Appearance
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    damageDivisor: 6
    trackAllDamage: true
    damageOverlay:
      sprite: Structures/Windows/cracks.rsi
  - type: StaticPrice
    price: 215
  - type: RadiationBlocker
    resistance: 5

- type: entity
  id: UraniumReinforcedWindowDirectional
  parent: [BaseDeltaPressureReinforcedPlasmaQuarter, WindowDirectionalRCDResistant]
  name: directional reinforced uranium window
  description: Don't smudge up the glass down there.
  placement:
    mode: SnapgridCenter
    snap:
    - Window
  components:
  - type: Sprite
    sprite: _Carpmosia/Structures/Windows/uranium_reinforced.rsi # Carpmosia-edit - Window resprite
    state: directional # Carpmosia-edit - Window resprite
  - type: Icon
    sprite: _Carpmosia/Structures/Windows/uranium_reinforced.rsi # Carpmosia-edit - Window resprite
    state: directional # Carpmosia-edit - Window resprite
  - type: Construction
    graph: WindowDirectional
    node: uraniumReinforcedWindowDirectional
  - type: Appearance
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    damageDivisor: 3
    trackAllDamage: true
    damageOverlay:
      sprite: Structures/Windows/cracks_directional.rsi
  - type: Damageable
    damageModifierSet: RGlass
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 225
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 113
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassUranium:
            min: 1
            max: 2
          PartRodMetal:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: StaticPrice
    price: 110
  - type: RadiationBlocker
    resistance: 2.5

- type: entity
  parent: ReinforcedUraniumWindow
  id: ReinforcedUraniumWindowDiagonal
  suffix: diagonal
  placement:
    mode: SnapgridCenter
    snap:
    - Window
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _Carpmosia/Structures/Windows/uranium_reinforced.rsi # Carpmosia-edit - Window resprite
    state: diagonal0 # Carpmosia-edit - Window resprite
  - type: Tag
    tags:
    - Diagonal
    - Window
  - type: IconSmooth
    mode: Diagonal
    key: windows_uranium # Carpmosia-edit - Wall resprite
    base: diagonal # Carpmosia-edit - Window resprite
  - type: Icon
    sprite: _Carpmosia/Structures/Windows/uranium_reinforced.rsi # Carpmosia-edit - Window resprite
    state: diagonal0 # Carpmosia-edit - Window resprite
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PolygonShape
            vertices:
            - "-0.5,-0.5"
            - "0.5,0.5"
            - "0.5,-0.5"
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: Airtight
    noAirWhenFullyAirBlocked: false
    airBlockedDirection:
    - South
    - East
  - type: DamageVisuals
    damageOverlay:
      sprite: Structures/Windows/cracks_diagonal.rsi
  - type: Construction
    graph: WindowDiagonal
    node: reinforcedUraniumWindowDiagonal
