# Tail Markings
- type: marking
  id: VulpTailFennec
  # Carpmosia-start - more tails for everyone
  coloring:
    default:
      type:
        !type:CategoryColoring
          category: Hair
      fallbackTypes:
      - !type:CategoryColoring
        category: FacialHair
      - !type:SkinColoring
  # Carpmosia-end - more tails for everyone
  bodyPart: Tail
  groupWhitelist: [ Human, Vulpkanin, Tajaran ] # Carpmosia-edit - more tails for everyone
  sprites:
    - sprite: Mobs/Customization/Vulpkanin/tail_markings.rsi
      state: fennec
    - sprite: Mobs/Customization/Vulpkanin/tail_markings.rsi
      state: fennec-tip

