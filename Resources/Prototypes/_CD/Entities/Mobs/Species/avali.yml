- type: entity
  save: false
  name: Urist McRaptor
  parent: BaseMobSpeciesOrganic
  id: BaseMobAvali
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Avali
  - type: Hunger
    baseDecayRate: 0.03 # Carpmosia - Slightly lower decay-rate than scurrets
  - type: Thirst
  - type: Icon
    sprite: _Carpmosia/Mobs/Species/Avali/parts.rsi # Carpmosia-Edit - Using Starlight sprites
    state: full
  - type: Body
    prototype: Avali
    requiredLegs: 2
    # Carpmosia-Begin - Port Avali into Carpmosia
  - type: Inventory
    speciesId: moth
    displacements:
      head:
        sizeMaps:
          32:
            sprite: _Carpmosia/Mobs/Species/Avali/displacement.rsi # Displacements from Starlight
            state: head
      mask:
        sizeMaps:
          32:
            sprite: _Carpmosia/Mobs/Species/Avali/displacement.rsi # Displacements from Starlight
            state: mask
    # Carpmosia-End - Port Avali into Carpmosia
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 3
  - type: Speech
    speechVerb: Parrot # RMC did it right.
    speechSounds: MaleAvali
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 95 #tiny
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: MaleAvali
      Female: FemaleAvali
      Unsexed: MaleAvali
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Avali
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
  - type: Bloodstream
    bloodReagent: AmmoniaBlood
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw # Carpmosia-edit - Use the right sound for their weapon
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    heatDamageThreshold: 310
    coldDamageThreshold: 223
    currentTemperature: 296.15
    specificHeat: 48
# Carpmosia-Begin - Port Avali into Carpmosia
    coldDamage:
      types:
        Cold : 0.05
    heatDamage:
      types:
        Heat : 3
  - type: TemperatureSpeed
    thresholds:
      265: 0.8
      251: 0.6
      226: 0.4
# Carpmosia-End - Port Avali into Carpmosia
  - type: ThermalRegulator
    metabolismHeat: 400 # icebirb go brrr
    radiatedHeat: 100
    implicitHeatRegulation: 500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 296.15
    thermalRegulationTemperatureThreshold: 10

- type: entity
  parent: BaseSpeciesDummy
  id: MobAvaliDummy
  categories: [ HideSpawnMenu ]
  description: A dummy avali meant to be used in character setup.
  components:
  - type: HumanoidAppearance
    species: Avali

# Chirp!
