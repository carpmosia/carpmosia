- type: antag
  id: Thief
  name: roles-antag-thief-name
  # Carpmosia-start - Antag playtimes
  playTimeTracker: AntagThief
  color: '#D82000'
  # Carpmosia-end - Antag playtimes
  antagonist: true
  setPreference: true
  objective: roles-antag-thief-objective
  guides: [ Thieves ]
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 1h

- type: antagSpecifier
  parent: RestrictedAntag
  id: Thief
  prefRoles:
  - Thief
  allowNonHumans: true
  multiAntagSetting: NotExclusive
  startingGear: ThiefGear
  components:
  - type: Pacified
  - type: Thieving
    stripTimeReduction: 2
    stealthy: true
  mindRoles:
  - MindRoleThief
  briefing:
    sound: "/Audio/Misc/thief_greeting.ogg"

- type: startingGear
  id: ThiefGear
  storage:
    back:
    - ThiefBeacon
    - SatchelThief
